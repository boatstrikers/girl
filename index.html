<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース情報サイト（仮）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-banner">
        <div class="logo">
            <h2>🚤 NEWS</h2>
            <p>ニュース</p>
        </div>
    </header>

    <nav class="main-menu">
        <ul>
            <li class="active"><span class="icon">🪟</span><br>新着情報</li>
            <li><span class="icon">🏆</span><br>レース速報</li>
            <li><span class="icon">📖</span><br>ブログ</li>
            <li><span class="icon">📎</span><br>ピックアップ</li>
            <li><span class="icon">⏰</span><br>イベント</li>
        </ul>
    </nav>

    <main class="content">
        <section class="calendar-section">
            <div class="calendar-header">
                <select class="date-select"><option>2026年</option></select>
                <select class="date-select"><option>3月</option></select>
                <button class="btn-show">表示</button>
            </div>

            <table class="calendar-table">
                <thead>
                    <tr>
                        <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td></td><td></td><td></td><td></td><td></td><td></td>
                        <td>1<br><span class="badge yellow">鳴門</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>3<br><span class="badge pink">びわこ</span></td>
                        <td>4<br><span class="badge pink">びわこ</span></td>
                        <td>5<br><span class="badge pink">びわこ</span></td>
                        <td>6<br><span class="badge pink">びわこ</span></td>
                        <td>7<br><span class="badge pink">びわこ</span></td>
                        <td>8<br><span class="badge pink">びわこ</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

</body>
</html>
